<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DNA Helix Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="panel">
        <h1>DNA Helix Viewer</h1>
        <p class="subtitle">Render an interactive 3D DNA double helix in your browser.</p>

        <label for="themeSelect">Theme</label>
        <select id="themeSelect" class="theme-select">
          <option value="cyberpunk">Cyberpunk</option>
          <option value="lab">Lab Mode</option>
          <option value="dark-matter">Dark Matter</option>
        </select>

        <label for="sequenceInput">DNA sequence (A/T/C/G)</label>
        <textarea
          id="sequenceInput"
          rows="4"
          placeholder="Paste DNA sequence here"
          spellcheck="false"
        ></textarea>

        <div class="actions">
          <button id="generateBtn" type="button">Generate</button>
          <span id="statusText" class="status"></span>
        </div>

        <section class="metrics" aria-label="Sequence statistics">
          <h2>Sequence Stats</h2>
          <div><span>Length</span><b id="sequenceLength">0</b></div>
          <div><span>GC %</span><b id="gcPercent">0.0%</b></div>
        </section>

        <div class="legend">
          <h2>Base Colors</h2>
          <div><span class="dot a"></span>A = Green</div>
          <div><span class="dot t"></span>T = Red</div>
          <div><span class="dot c"></span>C = Blue</div>
          <div><span class="dot g"></span>G = Yellow</div>
        </div>
      </aside>

      <main class="viewer-wrap">
        <div class="viewer-aura viewer-aura-1" aria-hidden="true"></div>
        <div class="viewer-aura viewer-aura-2" aria-hidden="true"></div>
        <div id="viewer"></div>
        <div id="tooltip" class="tooltip hidden"></div>
        <div id="clickTooltip" class="tooltip click-tooltip hidden"></div>
      </main>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
